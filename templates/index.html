<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cashflow Engine</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0f1115;
    color: #ffffff;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 30px;
}

.box {
    background: #1a1d24;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #63e6be;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#output {
    white-space: pre-wrap;
    font-family: monospace;
    margin-top: 20px;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
}
</style>

</head>
<body>

<div class="container">

    <h1>Scopri esattamente dove perdi soldi</h1>
    <div class="subtitle">Sistema deterministico. Nessuna interpretazione.</div>

    <div class="box">
        <h3>Analisi completa</h3>

        <form id="form">
            <input type="file" id="file" accept=".csv">
            <button type="submit">Analizza CSV</button>
        </form>

        <div id="output"></div>
    </div>

</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const fileInput = document.getElementById("file");

    if (!fileInput.files.length) {
        alert("Seleziona un file CSV");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("output").innerText =
            JSON.stringify(data, null, 2);

    } catch (err) {
        console.error(err);
        alert("Errore richiesta");
    }
};
</script>

</body>
</html>
