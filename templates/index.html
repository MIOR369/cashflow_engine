<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashflow Engine</title>

<style>
body {
    background:#0f1115;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:40px;
}
.container {
    max-width:700px;
    margin:auto;
}
.box {
    background:#1a1d24;
    padding:20px;
    border-radius:10px;
    margin:20px 0;
}
button {
    padding:12px 20px;
    background:#5cd6a0;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Cashflow Decision Engine</h1>

<div class="box">
<form id="form">
<input type="file" id="file" required>
<br><br>
<button type="submit">Analizza CSV</button>
</form>
</div>

<div class="box">
<h2>Risultato</h2>
<pre id="output">---</pre>
</div>

</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const fileInput = document.getElementById("file");

    if (!fileInput.files.length) {
        alert("Seleziona un file");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("output").innerText =
            JSON.stringify(data, null, 2);

    } catch (err) {
        console.error(err);
        alert("Errore richiesta");
    }
};
</script>

</body>
</html>
