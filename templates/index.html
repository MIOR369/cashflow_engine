<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashflow Engine</title>

<style>
body {
    background:#0f1115;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:40px;
}

.container {
    max-width:800px;
    margin:auto;
}

.box {
    background:#1a1d24;
    padding:20px;
    border-radius:10px;
    margin:20px 0;
}

button {
    padding:10px 20px;
    background:#00ff88;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

input {
    margin:10px 0;
}

#output {
    text-align:left;
    white-space:pre-wrap;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <h1>💰 Cashflow Decision Engine</h1>

    <div class="box">
        <form id="form">
            <input type="file" id="file" accept=".csv"><br>
            <button type="submit">Analizza</button>
        </form>
    </div>

    <div class="box">
        <h3>Risultato</h3>
        <div id="output">Nessun dato</div>
    </div>

</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const fileInput = document.getElementById("file");

    if (!fileInput.files.length) {
        alert("Seleziona un file");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("output").innerText =
            "DIAGNOSI: " + data.diagnosis + "\n\n" +
            "RISCHIO: " + data.risk + "\n" +
            "MARGINE: " + data.margin + "\n\n" +
            "CLIENTE CRITICO: " + data.critical_client + "\n\n" +
            "AZIONE: " + data.action;

    } catch (err) {
        console.error(err);
        alert("Errore richiesta");
    }
};
</script>

</body>
</html>
